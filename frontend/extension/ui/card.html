<!--
  Hover card markup only.
  Renders: % match badge, 1-sentence summary, top 2 implemented policies.
  No logic — all data binding handled by popup.js.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary:   #0D0F12;
      --color-secondary: #4B5260;
      --color-muted:     #8A919E;
      --color-border:    #E2E5E9;
      --color-fill:      #F1F3F5;
      --color-bg:        #F8F9FA;
      --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    }

    body {
      width: 300px;
      font-family: var(--font-sans);
      background: #fff;
      color: var(--color-primary);
    }

    /* ── Main card ── */
    #main-card {
      padding: 14px;
      border-bottom: 1px solid var(--color-border);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    #poli-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-primary);
      line-height: 1.3;
    }

    #match-badge {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    #summary {
      font-size: 12px;
      color: var(--color-secondary);
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .divider {
      height: 1px;
      background: var(--color-fill);
      margin-bottom: 10px;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--color-muted);
      margin-bottom: 7px;
    }

    .policy-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .policy-item {
      background: var(--color-fill);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 12px;
      color: var(--color-secondary);
    }

    /* ── Sync section ── */
    #sync-section {
      padding: 10px 14px 12px;
      background: var(--color-bg);
    }

    #sync-section .section-label {
      margin-bottom: 7px;
    }

    .sync-row {
      display: flex;
      gap: 6px;
    }

    #profile-code-input {
      flex: 1;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      color: var(--color-primary);
      font-family: var(--font-sans);
      outline: none;
    }

    #profile-code-input::placeholder { color: var(--color-muted); }
    #profile-code-input:focus { border-color: #aaa; }

    #set-profile-btn {
      background: var(--color-primary);
      border: 1px solid var(--color-primary);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    #set-profile-btn:hover { background: #2a2d35; }

    #sync-message {
      font-size: 11px;
      color: #1B6B3A;
      margin-top: 5px;
      min-height: 14px;
    }

    #poli-position {
      font-size: 11px;
      color: var(--color-muted);
      margin-top: 1px;
    }

    /* ── Overlap chart ── */
    #overlap-section {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--color-border);
    }

    #radar-chart {
      width: 100%;
      overflow: visible;
    }

    .radar-legend {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--color-secondary);
      font-family: var(--font-sans);
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Fallback ── */
    #fallback {
      padding: 22px 16px;
      font-size: 12px;
      color: var(--color-muted);
      text-align: center;
      line-height: 1.6;
      display: none;
    }
  </style>
</head>
<body>

  <div id="main-card" style="display:none">
    <div class="card-header">
      <div>
        <div id="poli-name"></div>
        <div id="poli-position"></div>
      </div>
      <div id="match-badge"></div>
    </div>
    <div id="summary"></div>
    <div class="divider"></div>
    <div class="section-label">Key Policies</div>
    <div class="policy-list" id="policies"></div>
  </div>

  <div id="overlap-section" style="display:none">
    <div class="section-label">Issue-by-Issue</div>
    <div id="radar-chart"></div>
    <div class="radar-legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#1565C0"></div>
        You
      </div>
      <div class="legend-item" id="radar-legend-poli">
        <div class="legend-swatch" style="background:#C84B00"></div>
        <span id="radar-legend-name"></span>
      </div>
    </div>
  </div>

  <div id="sync-section">
    <div class="section-label">Sync Profile</div>
    <div class="sync-row">
      <input id="profile-code-input" type="text" placeholder="Paste profile code" />
      <button id="set-profile-btn">Set</button>
    </div>
    <p id="sync-message"></p>
  </div>

  <p id="fallback">Double-click a politician's name on any page to see your match.</p>

  <script src="popup.js"></script>
</body>
</html>
