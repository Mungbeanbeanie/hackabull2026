<!--
  Hover card markup only.
  Renders: % match score, top aligned/misaligned dimensions, top 2 implemented policies.
  No logic — all data binding handled by popup.js.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic Info HUD</title>
  <style>
    body {
      width: 300px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px 16px;
      background: #0f0f0f;
      color: #e8e8e8;
    }
    #poli-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    #match-score {
      font-size: 28px;
      font-weight: 700;
      color: #7ee8a2;
      margin-bottom: 12px;
    }
    h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin: 10px 0 4px;
    }
    ol, ul {
      margin: 0;
      padding-left: 18px;
    }
    li {
      margin-bottom: 3px;
      line-height: 1.4;
    }
    #top-misaligned li { color: #f28b82; }
    #top-aligned li { color: #7ee8a2; }
    #fallback {
      color: #888;
      font-style: italic;
      display: none;
    }
  </style>
</head>
<body>
  <div id="poli-name"></div>
  <div id="match-score"></div>

  <h4>Top Aligned</h4>
  <ol id="top-aligned"></ol>

  <h4>Top Misaligned</h4>
  <ol id="top-misaligned"></ol>

  <h4>Top Implemented Policies</h4>
  <ul id="policies"></ul>

  <section id="sync-section">
    <input id="profile-code-input" type="text" placeholder="Paste profile code" />
    <button id="set-profile-btn">Set My Profile</button>
    <p id="sync-message"></p>
  </section>

  <p id="fallback">Double-click a politician&#39;s name to see your match.</p>

  <script type="module" src="popup.js"></script>
</body>
</html>
